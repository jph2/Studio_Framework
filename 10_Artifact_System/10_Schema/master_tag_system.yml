# Terminology Note:
# Internally, tags and keywords are the same—we treat them all as tags.
# When communicating externally, "tags/keywords" is acceptable for clarity.
# This file is the single source of truth for all tags/keywords.

# =========================
# CORE (reusable building blocks)
# =========================
core:
  tag_categories: &tag_categories
    environment: &env_tags
      - "inside_omniverse"      # Runs in Omniverse script editor
      - "outside_omniverse"     # Runs as standalone script
      - "hybrid"                # Can run in both environments
      - "standalone"            # Independent execution
      - "omniverse_editor"      # Omniverse-specific features
    
    functionality: &func_tags
      - "materials"             # Material-related operations
      - "materialx"             # MaterialX node graph, GraphEditor, material authoring
      - "variants"              # Variant management
      - "debugging"             # Debug and analysis tools
      - "analysis"              # Scene and data analysis
      - "conversion"            # Format or type conversion
      - "etl"                   # Extract, Transform, Load data pipelines
      - "consolidation"         # Combining or merging operations
      - "export"                # Data export functionality
      - "import"                # Data import functionality
      - "validation"            # Data validation and checking
      - "optimization"          # Performance optimization
      - "machine_learning"      # ML optimization and model training
      - "cleanup"               # Data cleanup and maintenance
      - "backup"                # Backup and restore operations
      - "packaging"             # Asset packaging and distribution
      - "distribution"          # Asset distribution workflows
      - "version_control"       # Version management
      - "automation"            # Automated workflows
      - "rendering"             # Rendering and visualization operations
      - "gaussian_splatting"    # 3D Gaussian Splatting / neural radiance representation
      - "capture"               # Image/video capture and recording
      - "compositing"           # Image compositing and post-production
      - "extension_development" # Building extensions/plugins for host applications
      - "camera_management"     # Camera setup, animation, and control
      - "synthetic_data_generation" # Generating synthetic training data for AI/ML
      - "semantic_integration"  # Semantic data integration
      - "binding_management"    # Binding creation and management
      - "governance"            # Governance and compliance operations
      - "agent_orchestration"   # Multi-agent coordination and workflow orchestration patterns
      - "multi_agent_systems"   # Systems that coordinate multiple AI agents working together
      - "swarm_intelligence"    # Collective intelligence patterns with multiple coordinating agents
      - "memory_systems"        # Persistent memory systems for AI agents (vector search, pattern matching)
      - "open_brain"           # Open, agent-readable memory infrastructure (Postgres + MCP)
    
    use_case: &use_case_tags
      - "scene_analysis"        # USD scene analysis
      - "material_management"   # Material organization and editing
      - "variant_control"       # Variant selection and management
      - "performance_tuning"    # Performance optimization
      - "quality_assurance"     # Quality checking and validation
      - "workflow_automation"   # Automated workflows
      - "usd_start_point"      # Canonical USD start-point anchor in multi-export and downstream ComfyUI workflows
      - "2d_spanning_tree"      # Stable navigation structure (e.g., Memex/knowledge navigation)
      - "second_brain_system"   # Personal knowledge system (Second Brain)
      - "memex"                 # Memex concept / knowledge augmentation space
      - "knowledge_graph"       # Graph-based knowledge representation (nodes/edges)
      - "stable_knowledge_navigation" # Stable navigation model for knowledge spaces
      - "time_tracking"         # Time tracking / timesheets for auditability
      - "audit_readiness"       # Audit-ready documentation & evidence setup
      - "evidence_chain"        # Evidence linkage (time → work package → artifacts)
      - "data_provenance"       # Data lineage/provenance (source → transforms → derived signals → outcomes)
      - "novelty_requirement"   # Novelty requirement (e.g., BSFZ/FuE logic)
      - "technical_uncertainty" # Technical uncertainty / Unwägbarkeit framing
      - "systematic_r_and_d_method" # Planmäßigkeit / systematic R&D approach
      - "work_package_planning" # Work packages (Arbeitspakete) planning & outputs
      - "deterministic_workflows" # Deterministic / reproducible workflows
      - "replayability"         # Replayability / reproducible reruns & recovery
      - "data_export"           # Exporting data for analysis
      - "file_processing"       # File manipulation and processing
      - "batch_processing"      # Processing multiple files
      - "error_fixing"          # Fixing common USD issues
      - "digital_twin_creation" # Digital twin development and management
      - "industrial_integration" # Industrial system integration
      - "semantic_governance"   # Semantic governance implementation
      - "binding_automation"    # Automated binding creation and management
      - "ai_assisted_development" # Development workflows enhanced with AI assistance
      - "context_window"        # LLM context window management and optimization
      - "generative_ai"         # Generative AI workflows (LLMs, diffusion, content generation)
      - "context_engineering"   # Designing and optimizing context for LLMs and AI agents
      - "product_photography"   # Automated product shot / catalog image generation
      - "turntable_capture"     # 360-degree product turntable rendering
      - "variant_sweep"         # Automated sweep through VariantSet combinations
      - "ai_content_pipeline"   # End-to-end pipeline from 3D rendering to AI-enhanced content
      - "branding"              # Branding / identity / visual identity
    
    complexity: &complexity_tags
