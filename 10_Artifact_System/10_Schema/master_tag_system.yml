# =========================
# RULES (use core by id/anchors)
# =========================
rules:

  tag_usage_standards:
    format: "lowercase_with_underscores"
    block_label: "Tag block"
    single_tag_block: "Exactly one top-level tag block per document"
    min_per_document: 5
    sweet_spot_per_document: "14-18"
    max_per_document: 25
    required_categories: ["environment", "functionality", "use_case"]
    recommended_categories: ["complexity", "industry", "dependencies"]
    optional_categories: ["research_type", "usd_specific", "performance", "safety", "integration", "output", "input"]
    
  tag_selection_guidelines:
    primary: "Start with primary functionality and environment"
    secondary: "Add complexity, industry, and use case tags"
    specific: "Include relevant USD-specific and performance tags"
    safety: "Add safety tags for production tools"
    integration: "Include integration tags for connected tools"
    length_sensitive_targeting:
      short_docs: "5-10 tags for short/simple notes"
      medium_docs: "10-16 tags for medium documents"
      long_docs: "14-20 tags for long/complex research"
  
  tag_usage_notes:
    digital_twin: "digital_twin (industry) = domain/vertical; digital_twin_creation (use_case) = activity/workflow"
    goodstart_semantics: "usd_goodstart/openusd_goodstart = repository identity tags; usd_start_point = pipeline start-point concept"
    alias_resolution:
      variansets_in_sessionlyr: "Use variants + layers (typo/legacy filename pattern; do not add as tag)"
      forschungszulage_einzelunternehmer_devframework: "Use r_and_d_tax_credit + bsfz_certification (topic phrase, not a tag)"
      workflow_engine_userguide: "Use workflow_automation (document type words like userguide are noise)"
      ai_coding_colemedin: "Use ai_assisted_development or ai_coding_agents (person names are noise)"
      aipowered_code_generation_tools: "Use ai_assisted_development (phrase normalized to canonical capability)"
      usd_startpoint: "Use usd_start_point (normalized underscore form)"
      websocket: "Use websocket_api (canonical API transport tag)"
      nucleus: "Use omniverse_nucleus (canonical Omniverse storage/collab tag)"
    noise_patterns:
      - "Document-state words are noise: final, test, draft, normal_subject, example, userguide"
      - "Long topic phrases should map to canonical tags, not become tags"
      - "Personal names or repo-local labels are noise unless recurring framework concepts"
    
  tag_validation:
    must_exist: "All tags must exist in master tag system"
    case_sensitive: "Use exact case from master definitions"
    no_duplicates: "No duplicate tags within same document"
    relevant: "Tags must be relevant to document content"
    
  tag_examples:
    material_tool: "materials, material_management, consolidation, analysis, hybrid, intermediate, usd_core, batch_processing, safe_execution, csv_output"
    variant_tool: "variants, variant_control, conversion, bulk_processing, outside_omniverse, advanced, usd_core, batch_processing, backup_creation, usd_output"
    debug_tool: "debugging, composition, performance, validation, hybrid, expert, usd_core, scene_analysis, memory_efficient, log_output"
    research_doc: "workflow_optimization, integration_pattern, packaging, distribution, version_control, omniverse, digital_twin, manufacturing, intermediate, usd_core, automation, performance"
    tutorial_doc: "materials, material_management, beginner, inside_omniverse, usd_core, automotive, best_practices, stage, prims, schemas"
    aas_integration_tool: "aas_integration, composable_bindings, semantic_governance, industrial_integration, digital_twin_creation, binding_automation, enterprise_software, industrial_automation, advanced, usd_core, semantic_integration, governance"
    product_shot_pipeline: "automation, rendering, capture, camera_management, product_photography, variant_sweep, advanced, omniverse, usd_core, troubleshooting, workflow_optimization, render_product, aov, multimatte, davinci_resolve, comfyui, nvidia_cosmos, nvidia_replicator"
    multi_export_comfyui_pipeline: "usd_start_point, workflow_automation, openusd, comfyui, framework_integration, deterministic_workflows, data_provenance, validation, usd_output"

  repository_specific:
    tutorials:
      focus: ["materials", "variants", "debugging", "analysis", "beginner", "intermediate", "usd_core", "omniverse", "best_practices"]
      format: "Use flat tag cloud for backward compatibility"
    scripts:
