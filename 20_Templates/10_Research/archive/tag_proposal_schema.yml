# Tag Proposal Schema
# Used for proposing new tags to the master tag system
# Generated by tag_sync_tool.py when new keywords are detected

meta:
  version: 1.0.0
  proposal_date: ""  # Auto-filled by tool
  source_document: ""  # Path to document that generated this proposal
  proposed_by: ""  # Author or system identifier

proposed_tags:
  # Each proposed tag follows this structure
  - tag_name: ""  # Proposed tag name (lowercase_with_underscores)
    display_name: ""  # Human-readable display name
    category: ""  # One of: environment, functionality, use_case, complexity, dependencies, industry, research_type, usd_specific, performance, safety, integration, output, input
    description: ""  # Brief description of what this tag represents
    context: ""  # Where/how it was found in the source document
    examples: []  # Example usage contexts
    related_tags: []  # Related existing tags from master system
    suggested_category_path: ""  # Suggested path in master tag system (e.g., "core.tag_categories.functionality")
    
# Example proposal:
# proposed_tags:
#   - tag_name: "agent_orchestration"
